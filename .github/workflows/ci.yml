name: qaforge CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  unit-and-api:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: flake8 app/ tests/

      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=app --cov-report=xml --alluredir=allure-results

      - name: Run API tests
        run: pytest tests/api/ -v --alluredir=allure-results

      - name: Run non-regression tests
        run: pytest tests/non_regression/ -v --alluredir=allure-results

      - name: Fail if coverage below 90%
        run: pytest tests/unit/ tests/api/ --cov=app --cov-fail-under=90

      - name: Generate HTML report
        run: pytest tests/unit/ tests/api/ tests/non_regression/ --html=reports/report.html --self-contained-html

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/report.html

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-unit-api
          path: allure-results

  e2e-selenium:
    runs-on: ubuntu-latest
    needs: unit-and-api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start application
        run: uvicorn app.main:app --host 0.0.0.0 --port 8000 &

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 10); do
            curl -sf http://localhost:8000/docs && break
            sleep 2
          done

      - name: Run Selenium E2E tests
        run: pytest tests/e2e/ -v --alluredir=allure-results

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-selenium
          path: allure-results

  e2e-cypress:
    runs-on: ubuntu-latest
    needs: unit-and-api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Cypress
        run: npm install

      - name: Start application
        run: uvicorn app.main:app --host 0.0.0.0 --port 8000 &

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 10); do
            curl -sf http://localhost:8000/docs && break
            sleep 2
          done

      - name: Run Cypress tests
        run: npx cypress run --config-file cypress/cypress.config.js

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-cypress
          path: allure-results

  allure-report:
    runs-on: ubuntu-latest
    needs: [unit-and-api, e2e-selenium, e2e-cypress]
    if: always()
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install allure-commandline
        run: npm install -g allure-commandline

      - name: Download unit/api results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-results-unit-api
          path: allure-results

      - name: Download Selenium results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-results-selenium
          path: allure-results

      - name: Download Cypress results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-results-cypress
          path: allure-results

      - name: Generate Allure report
        run: allure generate allure-results -o allure-report --clean

      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          destination_dir: allure-report
