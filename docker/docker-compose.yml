version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 5s
      timeout: 3s
      retries: 5

  selenium-chrome:
    image: selenium/standalone-chrome:latest
    ports:
      - "4444:4444"
      - "7900:7900"
    shm_size: "2g"
    depends_on:
      app:
        condition: service_healthy

  cypress:
    image: cypress/included:13.15.2
    working_dir: /e2e
    volumes:
      - ..:/e2e
    environment:
      - CYPRESS_baseUrl=http://app:8000
    depends_on:
      app:
        condition: service_healthy
    command: cypress run --config-file cypress/cypress.config.js
